name: Build Image

# Builds and publishes the always-on engine image to GHCR.
# Deployment (Portainer / docker compose) is owned outside CI and pulls the
# published tag — see deployment/README.md. This workflow does NOT deploy.

on:
  push:
    branches: [master]
    paths:
      - 'engine/**'
      - 'packages/**'
      - 'app/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'deployment/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
  schedule:
    # Nightly rebuild so :latest tracks the newest agent CLIs. The image
    # installs claude-code (npm) and cursor-agent (installer) at "latest" at
    # build time, then freezes — without a periodic rebuild the bundled CLIs
    # drift behind upstream. Scheduled runs set `no-cache` below so the CLI
    # install layers actually re-fetch rather than restoring from the gha cache.
    - cron: '17 4 * * *'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve lowercase image name
        id: image
        run: echo "name=${REGISTRY,,}/${REPO,,}/operator-engine" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Nightly scheduled runs build from scratch so the agent-CLI install
          # layers re-fetch the newest claude-code / cursor-agent; code-push and
          # manual builds keep the fast cached path.
          no-cache: ${{ github.event_name == 'schedule' }}
