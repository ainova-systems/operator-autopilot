name: Build Image

# Builds and publishes the always-on engine image to GHCR, then redeploys it to
# the operator's own VM through a self-hosted runner (label `operator-deploy`).
# The deploy job runs on master only (push + nightly schedule), so every merge
# and every nightly CLI refresh lands on the running operator. Generic / manual
# deployments (forks without a runner, Portainer) skip the deploy job and pull
# the tag their own way — see deployment/README.md and
# deployment/self-hosted-runner.md.

on:
  push:
    branches: [master]
    paths:
      - 'engine/**'
      - 'packages/**'
      - 'app/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'deployment/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
  schedule:
    # Nightly rebuild so :latest tracks the newest agent CLIs. The image
    # installs claude-code (npm) and cursor-agent (installer) at "latest" at
    # build time, then freezes — without a periodic rebuild the bundled CLIs
    # drift behind upstream. Scheduled runs set `no-cache` below so the CLI
    # install layers actually re-fetch rather than restoring from the gha cache.
    - cron: '17 4 * * *'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve lowercase image name
        id: image
        run: echo "name=${REGISTRY,,}/${REPO,,}/operator-engine" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Nightly scheduled runs build from scratch so the agent-CLI install
          # layers re-fetch the newest claude-code / cursor-agent; code-push and
          # manual builds keep the fast cached path.
          no-cache: ${{ github.event_name == 'schedule' }}

  # Redeploy the freshly built image onto the operator's own VM. Runs on the
  # self-hosted runner (label `operator-deploy`) and only on master (push +
  # nightly schedule), so every merge and every nightly CLI refresh reaches the
  # running daemon. Generic / manual deployments have no such runner and simply
  # skip this job — see deployment/self-hosted-runner.md.
  deploy:
    needs: build
    runs-on: [self-hosted, operator-deploy]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Redeploy operator-engine
        run: bash deployment/deploy.sh
        env:
          # Pin the exact image this run built — deterministic and rollbackable.
          OPERATOR_IMAGE: ${{ needs.build.outputs.image }}:${{ github.sha }}
